name: Update Liepin Job Board

on:
  workflow_dispatch:
  schedule:
    - cron: "20 1 * * *"

concurrency:
  group: liepin-job-board-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh board data
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "Refresh attempt: $attempt"
            if python liepin_daily_jobs.py; then
              exit 0
            fi
            if [[ "$attempt" -lt 3 ]]; then
              echo "Transient failure, retry after 120s"
              sleep 120
            fi
          done
          echo "Refresh failed after 3 attempts"
          exit 1

      - name: Add nojekyll marker
        run: touch docs/.nojekyll

      - name: Commit updates
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs liepin_output
            git commit -m "Update Liepin job board [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
